name: Publish to PyPI
on:
  push:
    tags:
      - 'v*'

jobs:
  build-n-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"
    - name: Install build
      run: pip install build
    - name: Build package
      run: python -m build
    - name: Publish
      uses: pypa/gh-action-pypi-publish@release/v1
